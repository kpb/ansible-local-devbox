---
# install docker

- name: install docker prerequisites
  ansible.builtin.apt:
    name: "{{ item }}"
    state: latest
    update_cache: yes
  loop:
    - apt-transport-https
    - ca-certificates
    - curl
    - gnupg-agent
    - software-properties-common

- name: ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: install docker repo key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: add docker repo
  ansible.builtin.apt_repository:
    repo: deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable
    state: present

- name: install docker
  ansible.builtin.apt:
    name: "{{ item }}"
    state: latest
    update_cache: yes
  loop:
    - docker-ce
    - docker-ce-cli
    - containerd.io

- name: run docker hello world for great profit
  ansible.builtin.command: docker run hello-world
  register: hello_world

- ansible.builtin.debug: var=hello_world.stdout_lines

- name: create docker group
  ansible.builtin.group:
    name: docker
    state: present

- name: add user to docker group
  ansible.builtin.user:
    name: "{{ user_name }}"
    groups: docker
    append: yes # OMG can't believe this isn't the default!

- name: start and enable docker systemd service
  ansible.builtin.systemd:
    name: docker
    enabled: yes
    daemon_reload: yes
    state: restarted

- name: pip install docker-compose
  ansible.builtin.pip:
    name: docker-compose
    state: latest
