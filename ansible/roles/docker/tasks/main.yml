---
# install docker using Docker's official Ubuntu apt repository

- name: remove conflicting Docker packages
  ansible.builtin.apt:
    name: "{{ docker_conflicting_packages }}"
    state: absent
    purge: yes
  tags:
    - upgrade

- name: install docker prerequisites
  ansible.builtin.apt:
    name: "{{ docker_prerequisite_packages }}"
    state: present
    update_cache: yes
  tags:
    - upgrade

- name: ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  tags:
    - upgrade

- name: install docker repo key
  ansible.builtin.get_url:
    url: "{{ docker_apt_repo_url }}/gpg"
    dest: "{{ docker_apt_keyring_path }}"
    mode: "0644"
  tags:
    - upgrade

- name: add docker repo
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_apt_architecture }} signed-by={{ docker_apt_keyring_path }}]
      {{ docker_apt_repo_url }} {{ ansible_lsb.codename }} stable
    state: present
    update_cache: yes
  tags:
    - upgrade

- name: install docker packages
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: latest
    update_cache: yes
  tags:
    - upgrade

- name: create docker group
  ansible.builtin.group:
    name: docker
    state: present
  tags:
    - upgrade

- name: add user to docker group
  ansible.builtin.user:
    name: "{{ user_name }}"
    groups: docker
    append: yes # OMG can't believe this isn't the default!
  tags:
    - upgrade

- name: start and enable docker systemd service
  ansible.builtin.systemd:
    name: docker
    enabled: yes
    state: started
  tags:
    - upgrade
