---
docker_apt_keyring_path: /etc/apt/keyrings/docker.asc
docker_apt_repo_url: https://download.docker.com/linux/ubuntu
docker_architecture_map:
  x86_64: amd64
  aarch64: arm64
  armv7l: armhf
  ppc64le: ppc64el
docker_apt_architecture: >-
  {{ docker_architecture_map.get(ansible_architecture, ansible_architecture) }}
docker_conflicting_packages:
  - docker.io
  - docker-compose
  - docker-compose-v2
  - docker-doc
  - podman-docker
  - containerd
  - runc
docker_prerequisite_packages:
  - ca-certificates
  - curl
  - gnupg
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin
