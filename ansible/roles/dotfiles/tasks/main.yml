---
# I/Kenneth keep my dotfiles at GitHub. Clone them and install via Makefile.

- name: ensure dotfiles dev root exists
  ansible.builtin.file:
    path: "{{ dotfiles_dev_root }}"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"
  tags:
    - upgrade

- name: clone dotfiles repo
  ansible.builtin.git:
    repo: "{{ dotfiles_repo_url }}"
    dest: "{{ dotfiles_repo_dest }}"
    update: yes
  become: yes
  become_user: "{{ user_name }}"
  tags:
    - upgrade

- name: install dotfiles
  ansible.builtin.command:
    argv:
      - make
      - install
    chdir: "{{ dotfiles_repo_dest }}"
  changed_when: true
  become: yes
  become_user: "{{ user_name }}"
  tags:
    - upgrade
